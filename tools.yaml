# tools.yaml — Single source of truth for UEMCP tool registry
# All tool counts, toolset membership, and descriptions are derived from this file.
# The Node.js MCP server loads this at startup. Plan markdown references it.
#
# Conventions:
#   - Tool names are unique across the entire registry (MCP requirement)
#   - Handler filename = UEMCP${PascalCase(toolsetName)}Commands.h/.cpp
#     Exception: input-and-pie splits into UEMCPInputCommands + UEMCPPIECommands
#   - params: stubs — populated incrementally during implementation
#   - Existing plugin toolsets (tcp-55557) have priority: null (not ours to implement)

# ─────────────────────────────────────────────────────────────
# Always-loaded management tools (6)
# Visible to Claude regardless of which toolsets are enabled
# ─────────────────────────────────────────────────────────────
management:
  description: Always-loaded discovery and management tools
  tools:
    connection_info:
      description: Show status of all 4 layers (TCP:55557, TCP:55558, HTTP:30010, Offline). Reports detected project, available layers, and enabled toolsets.
      params:
        force_reconnect: { type: boolean, required: false, default: false }

    detect_project:
      description: Run auto-detection chain and report which project's editor is open, with confidence score.
      params: {}

    find_tools:
      description: Keyword search across all tools. Returns matching tool names, descriptions, and parent toolset. Auto-enables parent toolsets of matches.
      params:
        query:       { type: string, required: true }
        max_results: { type: integer, required: false, default: 15 }

    list_toolsets:
      description: Show all toolsets with tool count, required layer, availability status, and enabled/disabled state. Orientation tool — call first to understand what's available.
      params: {}

    enable_toolset:
      description: Explicitly enable one or more toolsets by name. Fires tools/list_changed notification.
      params:
        toolsets: { type: array, items: string, required: true }

    disable_toolset:
      description: Disable one or more toolsets to free context. Use when switching tasks or active tool count is high.
      params:
        toolsets: { type: array, items: string, required: true }


# ─────────────────────────────────────────────────────────────
# Toolsets (15 toolsets, 114 tools) — plus 6 management tools above = 120 total
# ─────────────────────────────────────────────────────────────
toolsets:

  # ── Offline Layer ─────────────────────────────────────────
  offline:
    layer: offline
    priority: null   # built into Phase 1
    description: Project file analysis — always works, no editor needed
    tools:
      project_info:
        description: Read .uproject, list plugins, engine version, build config
      list_gameplay_tags:
        description: Parse DefaultGameplayTags.ini, return full tag hierarchy with comments
      search_gameplay_tags:
        description: Search tags by pattern (e.g., "Gameplay.State.*"). Globs - * matches one segment, ** matches across segments. Case-insensitive.
        params:
          pattern: { type: string, required: true, description: "Glob pattern matching tag hierarchy. * = single segment (no dots), ** = multiple segments." }
      list_config_values:
        description: Read any .ini config file. Progressive drill-down - call with no args to list files, with config_file to list sections, with all three for the value array. Section/key are case-insensitive.
        params:
          config_file: { type: string, required: false, description: "Filename with .ini extension (e.g., DefaultEngine.ini). Omit to list all available config files." }
          section:     { type: string, required: false, description: "Section name without brackets (e.g., /Script/Engine.Engine). Omit to list all sections in the file." }
          key:         { type: string, required: false, description: "Key name within the section. When set, returns all values for the key (multi-value keys return arrays)." }
      get_asset_info:
        description: Read .uasset header metadata (type, size, class, references). By default strips large blob tags (>1KB). Set verbose:true to return all tags.
        params:
          asset_path: { type: string, required: true, description: "Asset path (/Game/... or relative to project)" }
          verbose:    { type: boolean, required: false, default: false, description: "When false, strips blob tags exceeding 1KB. When true, returns all tags." }
      query_asset_registry:
        description: Bulk scan Content/ for assets matching class/path/tag filters. Returns up to `limit` results with objectClassName, tags, package name, export count. Supports pagination via offset/limit.
        params:
          class_name:  { type: string, required: false, description: "Exact match on primary object class (e.g., Blueprint, /Script/Engine.DataTable). Short names supported (e.g., DataTable for /Script/Engine.DataTable)." }
          path_prefix: { type: string, required: false, description: "/Game/... path to narrow the scan root (not a post-filter)" }
          tag_key:     { type: string, required: false, description: "Asset-registry tag key to require (e.g., BlueprintType, ParentClass)" }
          tag_value:   { type: string, required: false, description: "When provided, tag_key must equal this value. Omit for presence-only check." }
          limit:       { type: number, required: false, description: "Max matches returned (default 200, cap 2000)" }
          offset:      { type: number, required: false, description: "Result offset for pagination (default 0). Use with limit to page through results." }
          max_scan:    { type: number, required: false, description: "Max files walked (default 5000, cap 20000). Response sets truncated:true when hit." }
          verbose:     { type: boolean, required: false, default: false, description: "When false, strips blob tags exceeding 1KB. When true, returns all tags." }
      inspect_blueprint:
        description: Deep introspection of a .uasset (BP, UMG widget, AnimBP, DataAsset). Returns export table with resolved class/super/outer names, parent class, generated class. With include_defaults=true, also returns CDO UPROPERTY values (scalars, 10 engine structs, simple-element TArray/TSet; custom structs and complex containers marked unsupported). Use this for structural view + a convenience CDO dump in one call; use read_asset_properties when you need values on a non-CDO export or a filtered subset. NOTE - tags removed; use get_asset_info for asset-registry metadata. The old `verbose` param is no longer accepted (renamed to include_defaults with new semantics). Pointed query — not cached.
        params:
          asset_path:       { type: string, required: true, description: "/Game/... path (with or without .uasset extension) or project-relative Content/... path" }
          include_defaults: { type: boolean, required: false, default: false, description: "When true, include variable_defaults (decoded CDO UPROPERTYs) and an unsupported_defaults list." }
      list_level_actors:
        description: Enumerate placed actors in a .umap with transforms (location, rotation, scale from the actor's root component). Filters to exports whose outerIndex resolves to PersistentLevel/Level. Paginated — use limit/offset to page through dense maps, or summarize_by_class for an overview before drilling down. For a single actor's deeper UPROPERTY values (damage stats, tags, refs), follow up with read_asset_properties on the actor's export. Pointed query — not cached.
        params:
          asset_path:         { type: string, required: true, description: "/Game/... path to a .umap (with or without .umap extension)" }
          limit:              { type: number, required: false, description: "Max actors returned (default 100, cap 500)" }
          offset:             { type: number, required: false, description: "Result offset for pagination (default 0)" }
          summarize_by_class: { type: boolean, required: false, default: false, description: "When true, returns {className: count} instead of per-row actors. Use on dense levels before drilling down." }
      read_asset_properties:
        description: >-
          Read serialized UPROPERTY values from a specific export in a .uasset/.umap.
          Default export is the asset's primary CDO (Default__<Name>_C for BPs, main
          export otherwise). Supports scalars, enums, object refs, soft refs, gameplay
          tags/containers, 24 engine structs (FVector, FRotator, FQuat, FTransform,
          FLinearColor, FColor, FVector2D, FVector4, FGuid, FBox, FIntPoint,
          FBodyInstance, FSoftObjectPath, FSoftClassPath, FGameplayTag,
          FGameplayTagContainer, FExpressionInput, 7 MaterialInput variants),
          simple-element TArray/TSet, and FFieldPath. TMap with scalar keys is
          supported; struct-key TMap and unknown structs return {unsupported, reason}
          markers — never silently skipped.
          Reason codes — parser core: `unknown_struct` (struct outside engine registry —
          tagged self-describing decode applied), `unknown_property_type` (unsupported
          FPropertyTag type), `unexpected_preamble` (non-zero export body preamble —
          non-CDO subclass exports, AssetImportData), `serial_range_out_of_bounds`,
          `value_overruns_serial`, `tag_header_read_failed`, `property_tag_extensions`
          (UE 5.6 FPropertyTagExtensions field unhandled), `value_read_failed`,
          `delegate_not_serialized` (rarely fires on CDOs), `localized_text`,
          `size_budget_exceeded` (max_bytes). Containers: `complex_element_container`
          (TArray/TSet of custom structs without a binary-layout handler),
          `container_deferred` (TMap not yet supported), `container_count_unreasonable`,
          `set_with_removed_items`, `map_with_removed_items`, `map_type_params_missing`,
          `map_key_type_unsupported`, `map_value_type_unsupported`,
          `map_value_struct_name_missing`, `struct_key_map` (TMap with struct keys —
          wire format requires shape-key tagging not yet implemented). Struct-specific:
          `body_instance_native_layout_unknown` (FBodyInstance with HAS_BINARY_NATIVE
          flag — tagged-fallback covers partial overrides; native binary needs a known
          layout), `expression_input_native_layout_unknown` (FExpressionInput /
          MaterialInput beyond the documented native layouts). Handler-level:
          `no_cdo_export_found` (include_defaults=true but CDO export missing),
          `root_component_parse_failed` (list_level_actors only).
          Response capped at max_bytes with truncated flag. When property_names is set,
          unsupported[] is scoped to the filter (plus `__stream__`-wide markers).
        params:
          asset_path:     { type: string, required: true, description: "/Game/... path (with or without extension) or project-relative Content/... path" }
          export_name:    { type: string, required: false, description: "Target export objectName. Default: primary CDO (Default__<Name>_C for BPs) or main export for non-BP assets." }
          property_names: { type: array, items: string, required: false, description: "Filter to specific UPROPERTY names; omit for all readable properties." }
          max_bytes:      { type: number, required: false, description: "Response size budget in declared value bytes (default 65536). When exceeded, properties emit size_budget_exceeded markers (capped at 20) and truncated=true." }
      find_blueprint_nodes:
        description: >-
          Find K2Nodes in a Blueprint by class + member-reference match.
          Covers 19 skeletal K2Node classes — 17 non-delegate (Event, CustomEvent,
          FunctionEntry/Result, VariableGet/Set, CallFunction/CallParentFunction,
          IfThenElse, ExecutionSequence, Switch{Enum,String,Integer}, DynamicCast,
          MacroInstance, Self, Knot) plus 2 delegate-presence classes (AddDelegate,
          AssignDelegate — class identity only, no payload). Answers find/grep
          workflows like "which BPs call X", "what events does this BP handle",
          "where is variable Y accessed". Does NOT trace exec chains — pin edges
          live in the 3F sidecar (D48 S-A scope). Out-of-skeletal K2Node types
          (PromotableOperator, CommutativeAssociativeBinaryOperator,
          BreakStruct/MakeStruct, etc.) are counted in nodes_out_of_skeletal for
          discoverability but not returned. Pointed query — not cached.
        params:
          asset_path:   { type: string, required: true, description: "/Game/... path to a Blueprint .uasset (with or without extension)" }
          node_class:   { type: string, required: false, description: "Filter by K2Node class (e.g., K2Node_CallFunction). Omit for all skeletal types." }
          member_name:  { type: string, required: false, description: "Filter by FMemberReference.MemberName (function/variable/event name) — exact match." }
          target_class: { type: string, required: false, description: "Filter by FMemberReference.MemberParent class path (e.g., /Script/GameplayAbilities.GameplayAbility). Suffix match against target's packagePath also accepted." }
          limit:        { type: number, required: false, description: "Max nodes returned (default 100, cap 1000)." }
          offset:       { type: number, required: false, description: "Result offset for pagination (default 0)." }
      list_data_sources:
        description: Aggregate CSV-backed data sources under Content/ — classifies DataTable vs StringTable CSVs
        params: {}
      read_datatable_source:
        description: Parse a DataTable source CSV with UE conventions (first column = row name). Optional row_struct_header introspects companion USTRUCT fields.
        params:
          file_path:         { type: string, required: true, description: "Project-relative path to .csv (e.g., Content/Data/Foo.csv)" }
          row_struct_header: { type: string, required: false, description: "Project-relative path to .h defining the FTableRowBase USTRUCT" }
      read_string_table_source:
        description: Parse a StringTable source CSV — returns namespace (if present), Key/SourceString/Comment entries
        params:
          file_path: { type: string, required: true, description: "Project-relative path to the StringTable .csv" }
      list_plugins:
        description: List installed plugins with enabled/disabled status and version
      get_build_config:
        description: Parse .Build.cs, .Target.cs — show module dependencies and build settings

  # ── Existing Plugin (TCP:55557) ───────────────────────────
  actors:
    layer: tcp-55557
    priority: null   # existing plugin, not ours to implement
    description: Level editing, actor manipulation, viewport
    tools:
      get_actors:
        wire_type: get_actors_in_level
        description: List all actors in current level (with optional class filter)
        params: {}
        # NOTE: C++ handler accepts NO params — class_filter is aspirational (Phase 3)
      find_actors:
        wire_type: find_actors_by_name
        description: Find actors by name pattern
        params:
          pattern: { type: string, required: true, description: "Substring match against actor name (case-sensitive)" }
      spawn_actor:
        description: Spawn primitive actor (StaticMesh, Light, Camera, etc.)
        params:
          type:     { type: string, required: true, description: "One of: StaticMeshActor, PointLight, SpotLight, DirectionalLight, CameraActor" }
          name:     { type: string, required: true, description: "Actor label/name — must be unique in level" }
          location: { type: array, required: false, description: "[x, y, z] world position, default [0,0,0]" }
          rotation: { type: array, required: false, description: "[pitch, yaw, roll] in degrees, default [0,0,0]" }
          scale:    { type: array, required: false, description: "[x, y, z] scale, default [1,1,1]" }
      delete_actor:
        description: Delete actor by name
        params:
          name: { type: string, required: true, description: "Exact actor name" }
      set_actor_transform:
        description: Set location/rotation/scale (partial updates OK — only specified fields change)
        params:
          name:     { type: string, required: true, description: "Exact actor name" }
          location: { type: array, required: false, description: "[x, y, z] — preserves current if omitted" }
          rotation: { type: array, required: false, description: "[pitch, yaw, roll] — preserves current if omitted" }
          scale:    { type: array, required: false, description: "[x, y, z] — preserves current if omitted" }
      get_actor_properties:
        description: Get all properties of an actor
        params:
          name: { type: string, required: true, description: "Exact actor name" }
      set_actor_property:
        description: Set specific property by name (supports bool, int, float, string, enum)
        params:
          name:           { type: string, required: true, description: "Exact actor name" }
          property_name:  { type: string, required: true, description: "UProperty name on the actor" }
          property_value: { type: any, required: true, description: "Value — type coerced to match UProperty" }
      spawn_blueprint_actor:
        description: Spawn instance of a Blueprint class
        params:
          blueprint_name: { type: string, required: true, description: "Asset name only (looked up under /Game/Blueprints/)" }
          actor_name:     { type: string, required: true, description: "Name for the spawned actor" }
          location:       { type: array, required: false, description: "[x, y, z] default [0,0,0]" }
          rotation:       { type: array, required: false, description: "[pitch, yaw, roll] default [0,0,0]" }
          scale:          { type: array, required: false, description: "[x, y, z] default [1,1,1]" }
      focus_viewport:
        description: Move editor camera to location/actor (provide target OR location, not both)
        params:
          target:      { type: string, required: false, description: "Actor name to focus on" }
          location:    { type: array, required: false, description: "[x, y, z] world position to focus on" }
          distance:    { type: number, required: false, description: "Camera offset distance, default 1000" }
          orientation: { type: array, required: false, description: "[pitch, yaw, roll] camera rotation" }
      take_screenshot:
        description: Capture editor viewport to PNG file
        note: Legacy — get_viewport_screenshot in visual-capture returns inline base64
        params:
          filepath:     { type: string, required: true, description: "Output file path (.png appended if missing)" }
          resolution_x: { type: number, required: false, description: "Screenshot width in pixels" }
          resolution_y: { type: number, required: false, description: "Screenshot height in pixels" }

  blueprints-write:
    layer: tcp-55557
    priority: null
    description: Blueprint creation, components, nodes
    note: >
      7 more BP node tools (add_function_node, add_variable,
      add_self_reference, add_component_reference, connect_nodes, find_nodes)
      added below. See Section 8 of conformance-oracle-contracts.md for rationale.
      add_input_action_node stays under widgets (already listed there).
    tools:
      create_blueprint:
        description: Create new Blueprint class at /Game/Blueprints/<name>
        params:
          name:         { type: string, required: true, description: "Blueprint asset name" }
          parent_class: { type: string, required: false, description: "Parent class name, default AActor. Supports Pawn/Actor shorthand." }
      add_component:
        wire_type: add_component_to_blueprint
        description: Add component to Blueprint (auto-compiles after adding)
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          component_type: { type: string, required: true, description: "Class name — flexible resolution (StaticMesh, UStaticMeshComponent, etc.)" }
          component_name: { type: string, required: true, description: "Name for the new component" }
          location:       { type: array, required: false, description: "[x, y, z] — only for SceneComponents" }
          rotation:       { type: array, required: false, description: "[pitch, yaw, roll] — only for SceneComponents" }
          scale:          { type: array, required: false, description: "[x, y, z] — only for SceneComponents" }
      set_component_property:
        description: Set property on Blueprint component template
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          component_name: { type: string, required: true, description: "SCS node variable name" }
          property_name:  { type: string, required: true, description: "UProperty name" }
          property_value: { type: any, required: true, description: "Value — special SpringArm handling for Vector/Rotator" }
      compile_blueprint:
        description: Compile a Blueprint (does not report compile errors)
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
      set_blueprint_property:
        description: Set Blueprint Class Default Object property
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          property_name:  { type: string, required: true, description: "UProperty name on the CDO" }
          property_value: { type: any, required: true, description: "Value — type coerced via SetObjectProperty" }
      set_static_mesh_props:
        wire_type: set_static_mesh_properties
        description: Configure static mesh and material on component
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          component_name: { type: string, required: true, description: "Must be a UStaticMeshComponent" }
          static_mesh:    { type: string, required: false, description: "Asset path e.g. /Game/Meshes/Cube" }
          material:       { type: string, required: false, description: "Asset path — applied to slot 0 only" }
      set_physics_props:
        wire_type: set_physics_properties
        description: Configure physics simulation on a UPrimitiveComponent
        params:
          blueprint_name:   { type: string, required: true, description: "Blueprint asset name" }
          component_name:   { type: string, required: true, description: "Must be a UPrimitiveComponent" }
          simulate_physics: { type: boolean, required: false, description: "Enable/disable physics simulation" }
          mass:             { type: number, required: false, description: "Mass in kg (uses SetMassOverrideInKg)" }
          linear_damping:   { type: number, required: false, description: "Linear damping factor" }
          angular_damping:  { type: number, required: false, description: "Angular damping factor" }
      set_pawn_props:
        wire_type: set_pawn_properties
        description: Configure pawn settings on CDO (per-property results — can partially succeed)
        params:
          blueprint_name:                { type: string, required: true, description: "Blueprint asset name" }
          auto_possess_player:           { type: string, required: false, description: "Enum value e.g. Player0 (maps to EAutoReceiveInput::Player0)" }
          use_controller_rotation_yaw:   { type: boolean, required: false, description: "Maps to bUseControllerRotationYaw" }
          use_controller_rotation_pitch: { type: boolean, required: false, description: "Maps to bUseControllerRotationPitch" }
          use_controller_rotation_roll:  { type: boolean, required: false, description: "Maps to bUseControllerRotationRoll" }
          can_be_damaged:                { type: boolean, required: false, description: "Maps to bCanBeDamaged" }
      add_event_node:
        wire_type: add_blueprint_event_node
        description: Add event node (BeginPlay, Tick, etc.) — deduplicates, returns existing GUID if event already exists
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          event_name:     { type: string, required: true, description: "e.g. ReceiveBeginPlay, ReceiveTick" }
          node_position:  { type: array, required: false, description: "[x, y] graph position, default [0,0]" }
      # ── Orphan BP node handlers (added from conformance oracle Section 8) ──
      add_function_node:
        wire_type: add_blueprint_function_node
        description: Add function call node to event graph. Complex resolution — supports target class, default pin values.
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          function_name:  { type: string, required: true, description: "Function name to call" }
          target:         { type: string, required: false, description: "Target class (e.g. GameplayStatics, KismetMathLibrary). Omit to search BP's own class." }
          node_position:  { type: array, required: false, description: "[x, y] graph position, default [0,0]" }
          params:         { type: object, required: false, description: "Default values for function input pins" }
      add_variable:
        wire_type: add_blueprint_variable
        description: Add member variable to Blueprint (5 types supported)
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          variable_name:  { type: string, required: true, description: "Variable name" }
          variable_type:  { type: string, required: true, description: "One of: Boolean, Integer/Int, Float, String, Vector" }
          is_exposed:     { type: boolean, required: false, description: "If true, adds EditAnywhere flag. Default false." }
      add_self_reference:
        wire_type: add_blueprint_self_reference
        description: Add Self reference node (UK2Node_Self) to event graph
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          node_position:  { type: array, required: false, description: "[x, y] graph position, default [0,0]" }
      add_component_reference:
        wire_type: add_blueprint_get_self_component_reference
        description: Add VariableGet node for a named component in event graph
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          component_name: { type: string, required: true, description: "Component variable name" }
          node_position:  { type: array, required: false, description: "[x, y] graph position, default [0,0]" }
      connect_nodes:
        wire_type: connect_blueprint_nodes
        description: Connect two Blueprint graph nodes by pin
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          source_node_id: { type: string, required: true, description: "Source node GUID string" }
          target_node_id: { type: string, required: true, description: "Target node GUID string" }
          source_pin:     { type: string, required: true, description: "Pin name on source node" }
          target_pin:     { type: string, required: true, description: "Pin name on target node" }
      find_nodes:
        wire_type: find_blueprint_nodes
        description: Find nodes in event graph by type (currently only Event type supported)
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name" }
          node_type:      { type: string, required: true, description: "Currently only 'Event' supported" }
          event_name:     { type: string, required: false, description: "Required when node_type=Event" }

  widgets:
    layer: tcp-55557
    priority: null
    description: UMG widget creation and binding
    tools:
      create_widget:
        wire_type: create_umg_widget_blueprint
        description: Create UMG Widget Blueprint at /Game/Widgets/<name> with root CanvasPanel
        params:
          name: { type: string, required: true, description: "Widget blueprint name" }
      add_text_block:
        wire_type: add_text_block_to_widget
        description: Add text block to widget (requires root CanvasPanel)
        params:
          blueprint_name: { type: string, required: true, description: "Widget blueprint name" }
          widget_name:    { type: string, required: true, description: "Name for the TextBlock" }
          text:           { type: string, required: false, description: "Initial text, default 'New Text Block'" }
          position:       { type: array, required: false, description: "[x, y] canvas position" }
      add_button:
        wire_type: add_button_to_widget
        description: Add button with child TextBlock to widget (requires root CanvasPanel)
        params:
          blueprint_name: { type: string, required: true, description: "Widget blueprint name" }
          widget_name:    { type: string, required: true, description: "Button widget name" }
          text:           { type: string, required: true, description: "Button label text" }
          position:       { type: array, required: false, description: "[x, y] canvas position" }
      bind_widget_event:
        description: Bind widget event (e.g. OnClicked) to function in event graph
        params:
          blueprint_name: { type: string, required: true, description: "Widget blueprint name" }
          widget_name:    { type: string, required: true, description: "Widget to bind event on" }
          event_name:     { type: string, required: true, description: "Event name e.g. OnClicked" }
      set_text_block_binding:
        # KNOWN ISSUE: C++ handler connects exec pin to data pin (invalid connection).
        # The getter function graph is incomplete — binding will not work at runtime.
        # See conformance-oracle-contracts.md Section 4.6.
        description: Set text block data binding (BROKEN — see known issue)
        params:
          blueprint_name: { type: string, required: true, description: "Widget blueprint name" }
          widget_name:    { type: string, required: true, description: "TextBlock widget to bind" }
          binding_name:   { type: string, required: true, description: "Variable name for the binding" }
      add_widget_to_viewport:
        # KNOWN ISSUE: C++ handler is a NO-OP. Does NOT actually add widget to viewport.
        # Returns class path with instructions to use Blueprint nodes instead.
        # See conformance-oracle-contracts.md Section 4.3.
        description: Show widget in game viewport (NO-OP — returns class path only, does not add to viewport)
        params:
          blueprint_name: { type: string, required: true, description: "Widget blueprint name" }
          z_order:        { type: integer, required: false, description: "Z-order, default 0 (unused — handler is a no-op)" }
      add_input_action_node:
        wire_type: add_blueprint_input_action_node
        description: Add input action event node (legacy Input Actions, NOT Enhanced Input)
        params:
          blueprint_name: { type: string, required: true, description: "Blueprint asset name (works on any BP, not just widgets)" }
          action_name:    { type: string, required: true, description: "Input action name" }
          node_position:  { type: array, required: false, description: "[x, y] graph position, default [0,0]" }

  # ── New Custom Plugin (TCP:55558) ─────────────────────────
  gas:
    layer: tcp-55558
    priority: 1
    description: GAS asset creation and live queries
    tools:
      create_gameplay_effect:
        description: Create GE_ data asset with duration, modifiers, tags, stacking
        params:
          name:       { type: string, required: true }
          path:       { type: string, required: false, default: "/Game/GAS/Effects/" }
          duration:   { type: string, required: false }   # instant | has_duration | infinite
          modifiers:  { type: array, required: false }
          tags:       { type: array, required: false }
          stacking:   { type: object, required: false }
      create_gameplay_ability:
        description: Create GA_ Blueprint with activation/blocked tags, cost, cooldown
        params:
          name:             { type: string, required: true }
          path:             { type: string, required: false, default: "/Game/GAS/Abilities/" }
          activation_tags:  { type: array, required: false }
          blocked_tags:     { type: array, required: false }
      modify_gameplay_effect:
        description: Edit existing GE — add/remove modifiers, change tags, set period
        params:
          asset_path: { type: string, required: true }
      list_gameplay_tags_runtime:
        description: Query live tag hierarchy from editor (more accurate than offline parse)
        params:
          filter: { type: string, required: false }
      create_attribute_set:
        description: Generate AttributeSet class template with specified attributes
        params:
          name:       { type: string, required: true }
          attributes: { type: array, items: string, required: true }

  blueprint-read:
    layer: tcp-55558
    priority: 1
    description: Blueprint introspection — read graph, variables, functions, components
    tools:
      get_blueprint_info:
        description: Parent class, interfaces, component list, variable count, function count. Overview without loading full graph.
        params:
          asset_path: { type: string, required: true }
      get_blueprint_variables:
        description: All variables with types, default values, categories, replication flags, tooltips
        params:
          asset_path: { type: string, required: true }
      get_blueprint_functions:
        description: All functions with full signatures (params, return type, static/const/pure flags)
        params:
          asset_path: { type: string, required: true }
      get_blueprint_graphs:
        description: All graphs as JSON — event graphs, functions (including orphans), macros, delegate signatures. Nodes, pins, connections, default values. Optional graph_name filter.
        note: Consolidated from old get_blueprint_graph + get_all_blueprint_graphs
        aliases: [get_all_blueprint_graphs]
        params:
          asset_path:  { type: string, required: true }
          graph_name:  { type: string, required: false }
      get_blueprint_components:
        description: Component hierarchy tree with classes, attached-to relationships, and default property values
        params:
          asset_path: { type: string, required: true }
      get_blueprint_event_dispatchers:
        description: All event dispatchers with parameter signatures
        params:
          asset_path: { type: string, required: true }
      get_animbp_graph:
        description: AnimBP state machines — states, transitions (with conditions), blend trees, blend parameters. Plus standard EventGraph.
        params:
          asset_path: { type: string, required: true }
      get_widget_blueprint:
        description: Widget hierarchy tree (designer view), property bindings, plus standard EventGraph and functions.
        params:
          asset_path: { type: string, required: true }
      get_niagara_system_info:
        description: UNiagaraSystem metadata — emitter names, user-exposed parameters, fixed bounds. Read-only.
        params:
          asset_path: { type: string, required: true }

  asset-registry:
    layer: tcp-55558
    priority: 3
    description: Project-wide asset discovery and dependency analysis
    tools:
      search_assets:
        description: Find assets by class, path pattern, or tag. E.g., "all Blueprints under /Game/GAS/"
        params:
          class_filter: { type: string, required: false }
          path_pattern: { type: string, required: false }
          tag_filter:   { type: object, required: false }
      get_asset_references:
        description: Dependency graph — what this asset references and what references it. Essential for impact analysis.
        params:
          asset_path: { type: string, required: true }
      get_class_hierarchy:
        description: All Blueprint children of a given class. E.g., "all subclasses of UOSGameplayAbility"
        params:
          base_class: { type: string, required: true }
      get_datatable_contents:
        description: Read all rows from a DataTable asset as structured JSON (column names, types, values)
        params:
          asset_path: { type: string, required: true }
      get_asset_metadata:
        description: Full Asset Registry tags/metadata without loading the asset into memory
        params:
          asset_path: { type: string, required: true }

  animation:
    layer: tcp-55558
    priority: 2
    description: Animation creation and deep read — montages, sequences, blend spaces, curves
    tools:
      create_montage:
        description: Create UAnimMontage from AnimSequence
        params:
          name:           { type: string, required: true }
          anim_sequence:  { type: string, required: true }
          path:           { type: string, required: false }
      add_montage_section:
        description: Add named section to montage at specified time
        params:
          asset_path:    { type: string, required: true }
          section_name:  { type: string, required: true }
          time:          { type: number, required: true }
      add_montage_notify:
        description: Add AnimNotify/AnimNotifyState at specified time
        params:
          asset_path:    { type: string, required: true }
          notify_class:  { type: string, required: true }
          time:          { type: number, required: true }
      get_montage_full:
        description: Deep montage read — sections, notifies, slots, blend settings, composite segments.
        note: Supersedes old list_montage_sections
        params:
          asset_path: { type: string, required: true }
      get_anim_sequence_info:
        description: AnimSequence metadata — duration, frame count, rate, skeleton, notify tracks, curves, sync markers.
        params:
          asset_path: { type: string, required: true }
      get_blend_space:
        description: Blend axes, sample points, interpolation mode. Covers BlendSpace and BlendSpace1D.
        params:
          asset_path: { type: string, required: true }
      get_anim_curve_data:
        description: Float/vector/transform curve keyframes from any animation asset
        params:
          asset_path: { type: string, required: true }
      get_audio_asset_info:
        description: Metadata for audio assets — SoundCue, SoundWave, AkAudioEvent. Read-only.
        params:
          asset_path: { type: string, required: true }

  materials:
    layer: tcp-55558
    priority: 2
    description: Material creation, parameter access, and graph read
    tools:
      create_material:
        description: Create UMaterial with domain and blend mode
        params:
          name:       { type: string, required: true }
          path:       { type: string, required: false }
          domain:     { type: string, required: false }
          blend_mode: { type: string, required: false }
      create_material_instance:
        description: Create UMaterialInstanceConstant from parent
        params:
          name:          { type: string, required: true }
          parent_path:   { type: string, required: true }
          path:          { type: string, required: false }
      set_material_parameter:
        description: Set scalar/vector/texture param on material instance
        params:
          asset_path:     { type: string, required: true }
          parameter_name: { type: string, required: true }
          value:          { type: any, required: true }
      list_material_parameters:
        description: Get all parameters and current values from material
        params:
          asset_path: { type: string, required: true }
      get_material_graph:
        description: Full material expression node graph — nodes, connections, parameters. Covers UMaterial and UMaterialFunction.
        note: Consolidated — was listed in both Material Commands and Expanded Graph Introspection.
        params:
          asset_path: { type: string, required: true }

  data-assets:
    layer: tcp-55558
    priority: 3
    description: Data asset creation/read, curves, string tables, struct definitions
    tools:
      create_data_asset:
        description: Create UDataAsset of specified subclass
        params:
          name:      { type: string, required: true }
          subclass:  { type: string, required: true }
          path:      { type: string, required: false }
      set_data_asset_property:
        description: Set property on data asset by name and value
        params:
          asset_path:    { type: string, required: true }
          property_name: { type: string, required: true }
          value:         { type: any, required: true }
      list_data_asset_types:
        description: List available UDataAsset subclasses in project
        params: {}
      get_data_asset_properties:
        description: Read all UPROPERTY values on any UDataAsset subclass as structured JSON
        params:
          asset_path: { type: string, required: true }
      get_curve_asset:
        description: Read UCurveFloat/Vector/Color keyframes with tangents and interpolation. Also UCurveTable.
        params:
          asset_path: { type: string, required: true }
      get_string_table:
        description: Read UStringTable key/value entries. Useful for localization and UI text review.
        params:
          asset_path: { type: string, required: true }
      get_struct_definition:
        description: Read UUserDefinedStruct members and UUserDefinedEnum values.
        params:
          asset_path: { type: string, required: true }

  input-and-pie:
    layer: tcp-55558
    priority: 4
    description: Enhanced Input asset creation + Play In Editor control
    note: Splits into UEMCPInputCommands + UEMCPPIECommands at implementation time
    tools:
      create_input_action:
        description: Create UInputAction asset with value type
        params:
          name:       { type: string, required: true }
          value_type: { type: string, required: true }
          path:       { type: string, required: false }
      create_mapping_context:
        description: Create UInputMappingContext
        params:
          name: { type: string, required: true }
          path: { type: string, required: false }
      add_mapping:
        description: Add key-to-action binding to mapping context
        params:
          context_path: { type: string, required: true }
          action_path:  { type: string, required: true }
          key:          { type: string, required: true }
      start_pie:
        description: Launch Play In Editor (configurable — viewport, new window, standalone)
        params:
          mode: { type: string, required: false, default: viewport }
      stop_pie:
        description: End current PIE session
        params: {}
      execute_console_command:
        description: Run console command in PIE or editor context
        params:
          command: { type: string, required: true }
      is_pie_running:
        description: Check PIE status
        params: {}

  geometry:
    layer: tcp-55558
    priority: 4
    description: Procedural mesh and CSG (requires Geometry Script plugin)
    tools:
      create_procedural_mesh:
        description: Create Dynamic Mesh actor with primitive shape (box, sphere, cylinder, cone)
        params:
          shape:    { type: string, required: true }
          location: { type: array, required: false }
          size:     { type: number, required: false }
      mesh_boolean:
        description: CSG operation (union, difference, intersection) between two meshes
        params:
          target:    { type: string, required: true }
          tool:      { type: string, required: true }
          operation: { type: string, required: true }
      generate_uvs:
        description: Auto-unwrap UVs on a dynamic mesh
        params:
          target: { type: string, required: true }
      get_mesh_info:
        description: Get vertex count, triangle count, bounds, material slots
        params:
          target: { type: string, required: true }

  editor-utility:
    layer: tcp-55558
    priority: 4
    description: Editor state, Python execution, editor utility Blueprints, asset management
    note: >
      Includes asset manipulation tools (duplicate/rename/delete). If 8 tools causes
      selection issues, split into editor-utility + asset-management sub-toolset.
    tools:
      get_editor_state:
        description: Current level, selected actors, viewport info
        params: {}
      run_python_command:
        description: Execute Python script in editor (requires Python Editor Script Plugin). Security note — arbitrary code execution.
        params:
          command: { type: string, required: true }
      get_editor_utility_blueprint:
        description: Read EUB/EUW — standard BP introspection + run method + editor menu registration
        params:
          asset_path: { type: string, required: true }
      run_editor_utility:
        description: Execute an Editor Utility Blueprint's Run action
        params:
          asset_path: { type: string, required: true }
      create_asset:
        description: Generic asset creation via UFactory (specify class, path, name)
        params:
          name:        { type: string, required: true }
          asset_class: { type: string, required: true }
          path:        { type: string, required: true }
      duplicate_asset:
        description: Duplicate existing asset to new path
        params:
          source_path: { type: string, required: true }
          dest_path:   { type: string, required: true }
      rename_asset:
        description: Rename/move asset with automatic reference fixup
        params:
          asset_path: { type: string, required: true }
          new_name:   { type: string, required: true }
      delete_asset_safe:
        description: Delete asset after checking for dependencies
        params:
          asset_path: { type: string, required: true }
          force:      { type: boolean, required: false, default: false }

  visual-capture:
    layer: tcp-55558
    priority: 4
    description: Screenshots, thumbnails, and asset previews as inline images
    note: ~1MB stdio payload limit. Server enforces max resolution and JPEG fallback.
    tools:
      get_asset_thumbnail:
        description: Content Browser thumbnail as inline PNG (256x256). Batch mode supported. Uses UThumbnailManager.
        params:
          asset_paths: { type: array, items: string, required: true }
      get_viewport_screenshot:
        description: Active viewport as inline base64 PNG. Configurable resolution.
        params:
          quality: { type: string, required: false, default: medium }
      get_asset_preview_render:
        description: Offscreen 3D preview via FPreviewScene. For meshes, materials, particles. Configurable camera/lighting.
        params:
          asset_path: { type: string, required: true }
          quality:    { type: string, required: false, default: medium }
      capture_active_editor_tab:
        description: Active editor panel (BP graph, material editor, etc.) via FWidgetRenderer. Asset must be open.
        params: {}
      get_asset_visual_summary:
        description: Combines text introspection JSON + inline thumbnail/preview in one MCP response.
        params:
          asset_path: { type: string, required: true }

  # ── Remote Control API (HTTP:30010) ───────────────────────
  remote-control:
    layer: http-30010
    priority: null   # Phase 4
    description: Reflection-based property/function access on any UObject
    tools:
      rc_get_property:
        description: Get any UPROPERTY by object path + property name
        params:
          object_path:   { type: string, required: true }
          property_name: { type: string, required: true }
      rc_set_property:
        description: Set any UPROPERTY by object path + property name + value
        params:
          object_path:   { type: string, required: true }
          property_name: { type: string, required: true }
          value:         { type: any, required: true }
      rc_call_function:
        description: Call any UFUNCTION on any UObject
        params:
          object_path:   { type: string, required: true }
          function_name: { type: string, required: true }
          args:          { type: object, required: false }
      rc_list_objects:
        description: Search for UObjects by class name pattern
        params:
          class_pattern: { type: string, required: true }
      rc_describe_object:
        description: List all properties and functions on a specific object
        params:
          object_path: { type: string, required: true }
      rc_batch:
        description: Execute multiple RC operations atomically
        params:
          operations: { type: array, required: true }
      rc_get_presets:
        description: List Remote Control presets (requires RC Components plugin)
        params: {}
      rc_passthrough:
        description: Raw HTTP request to any RC API endpoint
        params:
          method:   { type: string, required: true }
          endpoint: { type: string, required: true }
          body:     { type: object, required: false }


# ─────────────────────────────────────────────────────────────
# Alias map for ToolIndex search expansion
# Keys are abbreviations. Values are canonical token arrays.
# Applied after tokenization + stemming, before scoring.
# ─────────────────────────────────────────────────────────────
aliases:
  ge:  [gameplay, effect]
  ga:  [gameplay, ability]
  gas: [gameplay, ability, system]
  bp:  [blueprint]
  abp: [animation, blueprint]
  wbp: [widget, blueprint]
  eub: [editor, utility, blueprint]
  pie: [play, editor]
  rc:  [remote, control]
  mw:  [motion, warping]
  mid: [material, instance]
  sm:  [static, mesh]
  sk:  [skeletal, mesh]
  imc: [input, mapping, context]
  vfx: [niagara, particle, effect]
  sfx: [audio, sound]
  ui:  [widget, umg]
  hud: [widget, hud]
