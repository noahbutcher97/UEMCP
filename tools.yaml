        params:
          asset_path:    { type: string, required: true }
          property_name: { type: string, required: true }
          value:         { type: any, required: true }
      # reduced_scope: reflection-only "subclasses defined in loaded modules" (discover runtime-registered DataAsset classes); AR-tag-surface shipped offline
      # displaced_by: query_asset_registry (class_name:DataAsset)
      list_data_asset_types:
        description: List available UDataAsset subclasses in project
        params: {}
      # reduced_scope: compiled/baked curve evaluation + complex UCurveTable joins; simple UCurveFloat/Vector/Color keyframes shipped offline
      # displaced_by: read_asset_properties
      get_curve_asset:
        description: Read UCurveFloat/Vector/Color keyframes with tangents and interpolation. Also UCurveTable.
        params:
          asset_path: { type: string, required: true }
      # reduced_scope: localization compilation + culture-specific lookups; binary UStringTable key/value entries shipped offline via D50 tagged-fallback
      # displaced_by: read_asset_properties
      get_string_table:
        description: Read UStringTable key/value entries. Useful for localization and UI text review.
        params:
          asset_path: { type: string, required: true }
      # reduced_scope: member metadata (EditAnywhere, BlueprintReadWrite flags, tooltips); member layout shipped offline via D50 tagged-fallback
      # displaced_by: read_asset_properties
      get_struct_definition:
        description: Read UUserDefinedStruct members and UUserDefinedEnum values.
        params:
          asset_path: { type: string, required: true }

  input-and-pie:
