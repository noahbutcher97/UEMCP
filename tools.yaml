      # displaced_by: (deferred — offline static-mesh header parse could cover vertex/triangle counts in a future enhancement per §Q1.8)
      get_mesh_info:
        description: Get vertex count, triangle count, bounds, material slots
        params:
          target: { type: string, required: true }

  editor-utility:
    layer: tcp-55558
    priority: 4
    description: Editor state, Python execution, editor utility Blueprints, asset management
    note: >
